name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  HUSKY: "0"

jobs:
  quality:
    name: Quality (Lint + Typecheck + Build + Unit Coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint workspaces
        run: npm run lint

      - name: Typecheck workspaces
        run: npm run typecheck

      - name: Build workspaces
        run: npm run build --workspaces

      - name: Unit tests with coverage (api)
        env:
          NODE_ENV: test
          PORT: 3000
          LOG_LEVEL: info
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: app
          DB_PASSWORD: app
          DB_NAME: cv_test
          CORS_ORIGINS: http://localhost:3001
          CORS_METHODS: GET,HEAD,PUT,PATCH,POST,DELETE,OPTIONS
          CORS_ALLOWED_HEADERS: Content-Type,Authorization,X-Request-Id
          CORS_EXPOSED_HEADERS: X-Request-Id
          CORS_CREDENTIALS: "true"
          CORS_MAX_AGE_SECONDS: 600
          RATE_LIMIT_TTL_MS: 60000
          RATE_LIMIT_LIMIT: 100
          TRUST_PROXY: "false"
          REQUEST_TIMEOUT_MS: 30000
          HEADERS_TIMEOUT_MS: 30000
          KEEP_ALIVE_TIMEOUT_MS: 5000
          REQUEST_BODY_LIMIT: 1mb
          OTEL_SERVICE_NAME: cv-api-test
          OTEL_EXPORTER_OTLP_ENDPOINT: http://localhost:4318
          OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
          OTEL_TRACES_EXPORTER: otlp
          OTEL_METRICS_EXPORTER: none
          OTEL_LOGS_EXPORTER: none
          FEATURE_FLAGS: swagger_docs=true,rum_ingest=true
        run: npm run test:cov -w @cv/api -- --watchman=false --ci

      - name: Upload api coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: apps/api/coverage
          if-no-files-found: warn

  secrets-scan:
    name: Secrets Scan (Gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        run: |
          set -euo pipefail
          VERSION=8.24.2
          mkdir -p artifacts
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --no-git --redact --config .gitleaks.toml --report-format json --report-path artifacts/gitleaks-report.json

      - name: Upload gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: artifacts/gitleaks-report.json
          if-no-files-found: warn

  integration-e2e:
    name: Integration + E2E + k6
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: quality

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Prepare CI env
        run: |
          cat > docker/.env <<'EOF'
          TOLGEE_API_KEY=${{ secrets.TOLGEE_API_KEY }}
          EOF
          cat > apps/web/.env <<'EOF'
          NEXT_PUBLIC_API_BASE_URL=http://api:3000
          NEXT_PUBLIC_RUM_ENABLED=false
          NEXT_PUBLIC_RUM_ENDPOINT=http://api:3000/v1/rum/events
          I18N_SOURCE=local
          EOF

      - name: Compose up (postgres_test + api_test)
        run: docker compose --env-file docker/.env -f docker/compose.yml -f docker/compose.ci.yml --profile test up -d --build postgres_test api_test

      - name: Wait for API (test)
        run: |
          i=1
          while [ $i -le 60 ]; do
            if curl -fsS http://localhost:3003/v1/health/ready > /dev/null; then
              echo "API test is healthy"
              exit 0
            fi
            sleep 2
            i=$((i+1))
          done
          docker compose --env-file docker/.env -f docker/compose.yml -f docker/compose.ci.yml logs --no-color api_test
          exit 1

      - name: Run migrations (test DB)
        env:
          NODE_ENV: test
          PORT: 3000
          LOG_LEVEL: info
          DB_HOST: localhost
          DB_PORT: 5433
          DB_USER: app
          DB_PASSWORD: app
          DB_NAME: cv_test
          CORS_ORIGINS: http://localhost:3001
          CORS_METHODS: GET,HEAD,PUT,PATCH,POST,DELETE,OPTIONS
          CORS_ALLOWED_HEADERS: Content-Type,Authorization,X-Request-Id
          CORS_EXPOSED_HEADERS: X-Request-Id
          CORS_CREDENTIALS: "true"
          CORS_MAX_AGE_SECONDS: 600
          RATE_LIMIT_TTL_MS: 60000
          RATE_LIMIT_LIMIT: 100
          TRUST_PROXY: "false"
          REQUEST_TIMEOUT_MS: 30000
          HEADERS_TIMEOUT_MS: 30000
          KEEP_ALIVE_TIMEOUT_MS: 5000
          REQUEST_BODY_LIMIT: 1mb
          OTEL_SERVICE_NAME: cv-api-test
          OTEL_EXPORTER_OTLP_ENDPOINT: http://localhost:4318
          OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
          OTEL_TRACES_EXPORTER: otlp
          OTEL_METRICS_EXPORTER: none
          OTEL_LOGS_EXPORTER: none
          FEATURE_FLAGS: swagger_docs=true,rum_ingest=true
        run: npm run migration:run -w @cv/api

      - name: Integration tests (api)
        env:
          NODE_ENV: test
          PORT: 3000
          LOG_LEVEL: info
          DB_HOST: localhost
          DB_PORT: 5433
          DB_USER: app
          DB_PASSWORD: app
          DB_NAME: cv_test
          CORS_ORIGINS: http://localhost:3001
          CORS_METHODS: GET,HEAD,PUT,PATCH,POST,DELETE,OPTIONS
          CORS_ALLOWED_HEADERS: Content-Type,Authorization,X-Request-Id
          CORS_EXPOSED_HEADERS: X-Request-Id
          CORS_CREDENTIALS: "true"
          CORS_MAX_AGE_SECONDS: 600
          RATE_LIMIT_TTL_MS: 60000
          RATE_LIMIT_LIMIT: 100
          TRUST_PROXY: "false"
          REQUEST_TIMEOUT_MS: 30000
          HEADERS_TIMEOUT_MS: 30000
          KEEP_ALIVE_TIMEOUT_MS: 5000
          REQUEST_BODY_LIMIT: 1mb
          OTEL_SERVICE_NAME: cv-api-test
          OTEL_EXPORTER_OTLP_ENDPOINT: http://localhost:4318
          OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
          OTEL_TRACES_EXPORTER: otlp
          OTEL_METRICS_EXPORTER: none
          OTEL_LOGS_EXPORTER: none
          FEATURE_FLAGS: swagger_docs=true,rum_ingest=true
        run: npm run test:int -w @cv/api -- --watchman=false --detectOpenHandles

      - name: E2E tests (api)
        env:
          NODE_ENV: test
          PORT: 3000
          LOG_LEVEL: info
          DB_HOST: localhost
          DB_PORT: 5433
          DB_USER: app
          DB_PASSWORD: app
          DB_NAME: cv_test
          CORS_ORIGINS: http://localhost:3001
          CORS_METHODS: GET,HEAD,PUT,PATCH,POST,DELETE,OPTIONS
          CORS_ALLOWED_HEADERS: Content-Type,Authorization,X-Request-Id
          CORS_EXPOSED_HEADERS: X-Request-Id
          CORS_CREDENTIALS: "true"
          CORS_MAX_AGE_SECONDS: 600
          RATE_LIMIT_TTL_MS: 60000
          RATE_LIMIT_LIMIT: 100
          TRUST_PROXY: "false"
          REQUEST_TIMEOUT_MS: 30000
          HEADERS_TIMEOUT_MS: 30000
          KEEP_ALIVE_TIMEOUT_MS: 5000
          REQUEST_BODY_LIMIT: 1mb
          OTEL_SERVICE_NAME: cv-api-test
          OTEL_EXPORTER_OTLP_ENDPOINT: http://localhost:4318
          OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
          OTEL_TRACES_EXPORTER: otlp
          OTEL_METRICS_EXPORTER: none
          OTEL_LOGS_EXPORTER: none
          FEATURE_FLAGS: swagger_docs=true,rum_ingest=true
        run: npm run test:e2e -w @cv/api -- --watchman=false --detectOpenHandles

      - name: Export OpenAPI spec (api_test)
        run: |
          mkdir -p artifacts
          docker compose --env-file docker/.env -f docker/compose.yml -f docker/compose.ci.yml --profile test exec -T api_test sh -lc 'wget -qO- http://localhost:3000/docs-json' > artifacts/openapi.test.json

      - name: Regenerate web API contract
        run: npm run contract:gen:web -- artifacts/openapi.test.json apps/web/src/lib/api/generated.ts

      - name: Enforce API contract drift
        run: git diff --exit-code -- apps/web/src/lib/api/generated.ts

      - name: Backup/restore drill (test Postgres)
        run: COMPOSE_FILES="docker/compose.yml docker/compose.ci.yml" ./scripts/db-backup-restore-drill.sh

      - name: k6 smoke (test)
        run: docker compose --env-file docker/.env -f docker/compose.yml -f docker/compose.ci.yml --profile test up --abort-on-container-exit --exit-code-from k6_test k6_test

      - name: Upload k6 summary
        if: ${{ always() && hashFiles('artifacts/k6-summary-test.json') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: k6-summary-test
          path: artifacts/k6-summary-test.json
          if-no-files-found: error

      - name: Compose logs (on failure)
        if: failure()
        run: docker compose --env-file docker/.env -f docker/compose.yml -f docker/compose.ci.yml logs --no-color

      - name: Compose down
        if: always()
        run: docker compose --env-file docker/.env -f docker/compose.yml -f docker/compose.ci.yml down -v

  security-supply-chain:
    name: Security + Supply Chain
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: quality

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Audit dependencies (prod only, high+)
        run: npm audit --omit=dev --audit-level=high

      - name: Build prod images
        run: |
          docker build -f apps/api/Dockerfile --target prod -t cv-api:ci .
          docker build -f apps/web/Dockerfile --target prod -t cv-web:ci .

      - name: Trivy scan (api image)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: cv-api:ci
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

      - name: Trivy scan (web image)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: cv-web:ci
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

      - name: Prepare artifacts dir
        run: mkdir -p artifacts

      - name: Generate SBOM (api image)
        uses: anchore/sbom-action@v0
        with:
          image: cv-api:ci
          format: spdx-json
          output-file: artifacts/sbom-api.spdx.json

      - name: Generate SBOM (web image)
        uses: anchore/sbom-action@v0
        with:
          image: cv-web:ci
          format: spdx-json
          output-file: artifacts/sbom-web.spdx.json

      - name: Upload SBOM artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            artifacts/sbom-api.spdx.json
            artifacts/sbom-web.spdx.json
          if-no-files-found: error

  web-smoke:
    name: Web Smoke (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: quality

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Install Playwright browser
        run: npm exec -w web playwright install --with-deps chromium

      - name: Prepare CI env
        run: |
          cat > docker/.env <<'EOF'
          TOLGEE_API_KEY=${{ secrets.TOLGEE_API_KEY }}
          EOF
          cat > apps/web/.env <<'EOF'
          NEXT_PUBLIC_API_BASE_URL=http://api_test:3000
          NEXT_PUBLIC_RUM_ENABLED=false
          NEXT_PUBLIC_RUM_ENDPOINT=http://api_test:3000/v1/rum/events
          I18N_SOURCE=local
          EOF

      - name: Compose up (postgres_test + api_test + web)
        run: docker compose --env-file docker/.env -f docker/compose.yml -f docker/compose.ci.yml --profile test up -d --build postgres_test api_test web

      - name: Run API migrations
        run: docker compose --env-file docker/.env -f docker/compose.yml -f docker/compose.ci.yml --profile test exec -T api_test npm run migration:run -w @cv/api

      - name: Wait for web
        run: |
          i=1
          while [ $i -le 60 ]; do
            if curl -fsS http://localhost:3001 > /dev/null; then
              echo "Web is reachable"
              exit 0
            fi
            sleep 2
            i=$((i+1))
          done
          docker compose --env-file docker/.env -f docker/compose.yml -f docker/compose.ci.yml logs --no-color web api
          exit 1

      - name: Run smoke tests
        run: WEB_BASE_URL=http://localhost:3001 npm run test:smoke -w web

      - name: Run accessibility audits
        run: WEB_BASE_URL=http://localhost:3001 npm run test:a11y -w web

      - name: Compose logs (on failure)
        if: failure()
        run: docker compose --env-file docker/.env -f docker/compose.yml -f docker/compose.ci.yml logs --no-color web api

      - name: Compose down
        if: always()
        run: docker compose --env-file docker/.env -f docker/compose.yml -f docker/compose.ci.yml down -v
