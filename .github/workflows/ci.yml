name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Audit dependencies (prod only, high+)
        run: npm audit --omit=dev --audit-level=high

      - name: Build workspaces
        run: npm run build --workspaces

      - name: Compose up (postgres + api)
        run: docker compose -f docker/compose.yml up -d --build postgres api

      - name: Wait for API
        run: |
          i=1
          while [ $i -le 60 ]; do
            if curl -fsS http://localhost:3000/v1/health > /dev/null; then
              echo "API is healthy"
              exit 0
            fi
            sleep 2
            i=$((i+1))
          done
          echo "API did not become healthy in time"
          docker compose -f docker/compose.yml logs --no-color api
          exit 1

      - name: Run migrations
        run: npm run migration:run -w @cv/api

      - name: k6 smoke
        run: docker compose -f docker/compose.yml --profile loadtest up --abort-on-container-exit --exit-code-from k6 k6

      - name: Compose logs (on failure)
        if: failure()
        run: docker compose -f docker/compose.yml logs --no-color

      - name: Compose down
        if: always()
        run: docker compose -f docker/compose.yml down -v