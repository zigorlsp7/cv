name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  HUSKY: "0"

jobs:
  quality:
    name: Quality (Lint + Typecheck + Build + Unit Coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Validate app compose manifests
        env:
          CV_SHARED_NETWORK: platform_ops_shared
          API_IMAGE: cv-api:ci
          WEB_IMAGE: cv-web:ci
          WEB_DOMAIN: app.example.com
          API_DOMAIN: api.example.com
          NODE_ENV: production
          API_PORT: "3000"
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: cv
          DB_HOST: postgres
          DB_PORT: "5432"
          DB_USER: app
          DB_PASSWORD: app
          DB_NAME: cv
          LOG_LEVEL: info
          CORS_ORIGINS: http://localhost:3001,http://web:3001
          CORS_METHODS: GET,HEAD,PUT,PATCH,POST,DELETE,OPTIONS
          CORS_ALLOWED_HEADERS: Content-Type,Authorization,X-Request-Id
          CORS_EXPOSED_HEADERS: X-Request-Id
          CORS_CREDENTIALS: "true"
          CORS_MAX_AGE_SECONDS: "600"
          RATE_LIMIT_TTL_MS: "60000"
          RATE_LIMIT_LIMIT: "100"
          TRUST_PROXY: "false"
          REQUEST_TIMEOUT_MS: "30000"
          HEADERS_TIMEOUT_MS: "30000"
          KEEP_ALIVE_TIMEOUT_MS: "5000"
          REQUEST_BODY_LIMIT: 1mb
          FEATURE_FLAGS: swagger_docs=false,rum_ingest=true
          OTEL_SERVICE_NAME: cv-api
          OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
          NEXT_PUBLIC_API_BASE_URL: http://api:3000
          NEXT_PUBLIC_RUM_ENABLED: "false"
          NEXT_PUBLIC_RUM_ENDPOINT: http://localhost:3000/v1/rum/events
          NEXT_PUBLIC_RELEASE: ci
          GOOGLE_CLIENT_ID: ""
          GOOGLE_CLIENT_SECRET: ""
          GOOGLE_OAUTH_REDIRECT_URI: ""
          ADMIN_GOOGLE_EMAILS: ""
          I18N_SOURCE: local
          TOLGEE_API_URL: http://tolgee:8080
          TOLGEE_PROJECT_ID: "2"
          OPENBAO_ADDR: http://openbao:8200
          OPENBAO_TOKEN: ci-dummy-token
          OPENBAO_KV_MOUNT: kv
          OPENBAO_SECRET_PATH: cv-web
          OPENBAO_REQUIRED_KEYS_API: ADMIN_API_TOKEN
          OPENBAO_REQUIRED_KEYS_WEB: ADMIN_API_TOKEN,AUTH_SESSION_SECRET,TOLGEE_API_KEY
        run: |
          docker compose -f docker/compose.app.local.yml config > /dev/null
          docker compose -f docker/compose.app.prod.yml config > /dev/null

      - name: Lint workspaces
        run: npm run lint

      - name: Typecheck workspaces
        run: npm run typecheck

      - name: Build workspaces
        run: npm run build --workspaces

      - name: Unit tests with coverage (api)
        run: npm run test:cov -w @cv/api -- --watchman=false --ci

      - name: Upload api coverage
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: api-coverage
          path: apps/api/coverage
          if-no-files-found: warn

  secrets-scan:
    name: Secrets Scan (Gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        run: |
          set -euo pipefail
          VERSION=8.24.2
          ARCHIVE="gitleaks_${VERSION}_linux_x64.tar.gz"
          mkdir -p artifacts
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/${ARCHIVE}" -o "/tmp/${ARCHIVE}"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_checksums.txt" -o /tmp/gitleaks_checksums.txt
          grep "${ARCHIVE}" /tmp/gitleaks_checksums.txt > /tmp/gitleaks_checksum_line.txt
          (cd /tmp && sha256sum -c /tmp/gitleaks_checksum_line.txt)
          tar -xzf "/tmp/${ARCHIVE}" -C /tmp gitleaks
          /tmp/gitleaks detect --source . --no-git --redact --config .gitleaks.toml --report-format json --report-path artifacts/gitleaks-report.json

      - name: Upload gitleaks report
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: gitleaks-report
          path: artifacts/gitleaks-report.json
          if-no-files-found: warn

  integration-e2e:
    name: Integration + E2E + k6
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: quality

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Compose up (postgres_test + api_test)
        run: docker compose -f docker/compose.ci.yml --profile test up -d --build postgres_test api_test

      - name: Wait for API (test)
        run: |
          i=1
          while [ $i -le 60 ]; do
            if curl -fsS http://localhost:3003/v1/health/ready > /dev/null; then
              echo "API test is healthy"
              exit 0
            fi
            sleep 2
            i=$((i+1))
          done
          docker compose -f docker/compose.ci.yml logs --no-color api_test
          exit 1

      - name: Run migrations (test DB)
        run: docker compose -f docker/compose.ci.yml --profile test exec -T api_test npm run migration:run -w @cv/api

      - name: Integration tests (api)
        run: npm run test:int:api

      - name: E2E tests (api)
        run: npm run test:e2e:api

      - name: Export OpenAPI spec (api_test)
        run: |
          mkdir -p artifacts
          docker compose -f docker/compose.ci.yml --profile test exec -T api_test sh -lc 'wget -qO- http://localhost:3000/docs-json' > artifacts/openapi.test.json

      - name: Regenerate web API contract
        run: npm run contract:gen:web -- artifacts/openapi.test.json apps/web/src/lib/api/generated.ts

      - name: Enforce API contract drift
        run: git diff --exit-code -- apps/web/src/lib/api/generated.ts

      - name: Backup/restore drill (test Postgres)
        run: COMPOSE_FILES="docker/compose.ci.yml" ./scripts/db-backup-restore-drill.sh

      - name: Wait for API (before k6)
        run: |
          i=1
          while [ $i -le 60 ]; do
            if curl -fsS http://localhost:3003/v1/health/ready > /dev/null; then
              echo "API test is healthy"
              exit 0
            fi
            sleep 2
            i=$((i+1))
          done
          docker compose -f docker/compose.ci.yml logs --no-color api_test
          exit 1

      - name: k6 smoke (test)
        run: docker compose -f docker/compose.ci.yml --profile test up --abort-on-container-exit --exit-code-from k6_test k6_test

      - name: Upload k6 summary
        if: ${{ always() && hashFiles('artifacts/k6-summary-test.json') != '' }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: k6-summary-test
          path: artifacts/k6-summary-test.json
          if-no-files-found: error

      - name: Compose logs (on failure)
        if: failure()
        run: docker compose -f docker/compose.ci.yml logs --no-color

      - name: Compose down
        if: always()
        run: docker compose -f docker/compose.ci.yml down -v

  security-supply-chain:
    name: Security + Supply Chain
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: quality

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Audit dependencies (prod only, high+)
        run: node ./scripts/audit-prod-gate.mjs

      - name: Build prod images
        run: |
          docker build -f apps/api/Dockerfile --target prod -t cv-api:ci .
          docker build -f apps/web/Dockerfile --target prod -t cv-web:ci .

      - name: Trivy scan (api image)
        uses: aquasecurity/trivy-action@e368e328979b113139d6f9068e03accaed98a518 # v0.34.1
        with:
          image-ref: cv-api:ci
          format: table
          exit-code: '1'
          ignore-unfixed: true
          trivyignores: .trivyignore
          vuln-type: os,library
          severity: HIGH,CRITICAL

      - name: Trivy scan (web image)
        uses: aquasecurity/trivy-action@e368e328979b113139d6f9068e03accaed98a518 # v0.34.1
        with:
          image-ref: cv-web:ci
          format: table
          exit-code: '1'
          ignore-unfixed: true
          trivyignores: .trivyignore
          vuln-type: os,library
          severity: HIGH,CRITICAL

      - name: Prepare artifacts dir
        run: mkdir -p artifacts

      - name: Generate SBOM (api image)
        uses: anchore/sbom-action@17ae1740179002c89186b61233e0f892c3118b11 # v0
        with:
          image: cv-api:ci
          format: spdx-json
          output-file: artifacts/sbom-api.spdx.json

      - name: Generate SBOM (web image)
        uses: anchore/sbom-action@17ae1740179002c89186b61233e0f892c3118b11 # v0
        with:
          image: cv-web:ci
          format: spdx-json
          output-file: artifacts/sbom-web.spdx.json

      - name: Upload SBOM artifacts
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: sbom
          path: |
            artifacts/sbom-api.spdx.json
            artifacts/sbom-web.spdx.json
          if-no-files-found: error

  web-smoke:
    name: Web Smoke (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: quality

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Install Playwright browser
        run: npm exec -w web playwright install --with-deps chromium

      - name: Compose up (postgres_test + api_test + web)
        run: docker compose -f docker/compose.ci.yml --profile test up -d --build postgres_test api_test web

      - name: Run API migrations
        run: docker compose -f docker/compose.ci.yml --profile test exec -T api_test npm run migration:run -w @cv/api

      - name: Wait for web
        run: |
          i=1
          while [ $i -le 60 ]; do
            if curl -fsS http://localhost:3001 > /dev/null; then
              echo "Web is reachable"
              exit 0
            fi
            sleep 2
            i=$((i+1))
          done
          docker compose -f docker/compose.ci.yml logs --no-color web api_test
          exit 1

      - name: Run smoke tests
        run: WEB_BASE_URL=http://localhost:3001 npm run test:smoke -w web

      - name: Run accessibility audits
        run: WEB_BASE_URL=http://localhost:3001 npm run test:a11y -w web

      - name: Compose logs (on failure)
        if: failure()
        run: docker compose -f docker/compose.ci.yml logs --no-color web api_test

      - name: Compose down
        if: always()
        run: docker compose -f docker/compose.ci.yml down -v
