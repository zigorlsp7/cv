name: Commitlint

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

env:
  HUSKY: "0"

permissions:
  contents: read

jobs:
  pr-title:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Lint PR title (Conventional Commits)
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          printf '%s\n' "$PR_TITLE" | npx -y -p @commitlint/cli@20.4.1 -p @commitlint/config-conventional@20.4.1 commitlint --config commitlint.config.js
