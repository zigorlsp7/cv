name: Deploy (Skeleton)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - name: Build + push API image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_API_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f apps/api/Dockerfile --target prod -t "$REGISTRY/$REPOSITORY:$IMAGE_TAG" .
          docker push "$REGISTRY/$REPOSITORY:$IMAGE_TAG"

      - name: Build + push Web image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_WEB_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f apps/web/Dockerfile --target prod -t "$REGISTRY/$REPOSITORY:$IMAGE_TAG" .
          docker push "$REGISTRY/$REPOSITORY:$IMAGE_TAG"

      - name: Export image URIs
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          API_REPOSITORY: ${{ vars.ECR_API_REPOSITORY }}
          WEB_REPOSITORY: ${{ vars.ECR_WEB_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "api_image=${REGISTRY}/${API_REPOSITORY}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "web_image=${REGISTRY}/${WEB_REPOSITORY}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
        id: image_uris

    outputs:
      api_image: ${{ steps.image_uris.outputs.api_image }}
      web_image: ${{ steps.image_uris.outputs.web_image }}

  deploy-ecs:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    needs: build-and-push

    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

      - name: Run DB migrations (optional one-off task)
        if: ${{ vars.ECS_MIGRATION_TASK_DEF != '' && vars.ECS_MIGRATION_NETWORK_CONFIG_JSON != '' }}
        run: |
          task_arn="$(aws ecs run-task \
            --cluster "${{ vars.ECS_CLUSTER_NAME }}" \
            --launch-type FARGATE \
            --task-definition "${{ vars.ECS_MIGRATION_TASK_DEF }}" \
            --network-configuration '${{ vars.ECS_MIGRATION_NETWORK_CONFIG_JSON }}' \
            --query 'tasks[0].taskArn' \
            --output text)"
          aws ecs wait tasks-stopped --cluster "${{ vars.ECS_CLUSTER_NAME }}" --tasks "$task_arn"
          exit_code="$(aws ecs describe-tasks \
            --cluster "${{ vars.ECS_CLUSTER_NAME }}" \
            --tasks "$task_arn" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)"
          test "$exit_code" = "0"

      - name: Deploy API task definition revision
        env:
          CLUSTER: ${{ vars.ECS_CLUSTER_NAME }}
          SERVICE: ${{ vars.ECS_API_SERVICE_NAME }}
          CONTAINER: ${{ vars.ECS_API_CONTAINER_NAME }}
          IMAGE_URI: ${{ needs.build-and-push.outputs.api_image }}
        run: |
          if [ -z "$CONTAINER" ]; then
            echo "ECS_API_CONTAINER_NAME repository variable is required" >&2
            exit 1
          fi

          current_td_arn="$(aws ecs describe-services \
            --cluster "$CLUSTER" \
            --services "$SERVICE" \
            --query 'services[0].taskDefinition' \
            --output text)"

          aws ecs describe-task-definition \
            --task-definition "$current_td_arn" \
            --query 'taskDefinition' \
            --output json > /tmp/api-td.json

          jq --arg image "$IMAGE_URI" --arg container "$CONTAINER" '
            .containerDefinitions |= map(
              if .name == $container then .image = $image else . end
            )
            | del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )
          ' /tmp/api-td.json > /tmp/api-td-updated.json

          new_td_arn="$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/api-td-updated.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)"

          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$SERVICE" \
            --task-definition "$new_td_arn" \
            --force-new-deployment

      - name: Deploy Web task definition revision
        env:
          CLUSTER: ${{ vars.ECS_CLUSTER_NAME }}
          SERVICE: ${{ vars.ECS_WEB_SERVICE_NAME }}
          CONTAINER: ${{ vars.ECS_WEB_CONTAINER_NAME }}
          IMAGE_URI: ${{ needs.build-and-push.outputs.web_image }}
        run: |
          if [ -z "$CONTAINER" ]; then
            echo "ECS_WEB_CONTAINER_NAME repository variable is required" >&2
            exit 1
          fi

          current_td_arn="$(aws ecs describe-services \
            --cluster "$CLUSTER" \
            --services "$SERVICE" \
            --query 'services[0].taskDefinition' \
            --output text)"

          aws ecs describe-task-definition \
            --task-definition "$current_td_arn" \
            --query 'taskDefinition' \
            --output json > /tmp/web-td.json

          jq --arg image "$IMAGE_URI" --arg container "$CONTAINER" '
            .containerDefinitions |= map(
              if .name == $container then .image = $image else . end
            )
            | del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )
          ' /tmp/web-td.json > /tmp/web-td-updated.json

          new_td_arn="$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/web-td-updated.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)"

          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$SERVICE" \
            --task-definition "$new_td_arn" \
            --force-new-deployment

      - name: Wait for ECS services to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster "${{ vars.ECS_CLUSTER_NAME }}" \
            --services "${{ vars.ECS_API_SERVICE_NAME }}" "${{ vars.ECS_WEB_SERVICE_NAME }}"

  post-deploy-smoke:
    name: Post-deploy Smoke
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    needs: deploy-ecs

    steps:
      - name: Health check
        run: |
          curl -fsS "${{ vars.DEPLOY_HEALTH_URL }}" > /dev/null
