title = "cv gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Allow local env files and known non-production placeholders"
paths = [
  '''(^|/)docker/\.env\..*\.local(\..*)?$''',
  '''(^|/)\.env\..*\.local(\..*)?$''',
  '''(^|/)docker/alertmanager\.email\.tpl\.yml$''',
  '''(^|/)docker/alertmanager\.prod\.yml$''',
]
regexes = [
  '''replace-with-gmail-app-password''',
  '''\$\{SMTP_AUTH_PASSWORD\}''',
]
