title = "cv gitleaks config"

[extend]
useDefault = true

[[allowlists]]
description = "Allow sample/local alert env templates"
paths = [
  '''(^|/)docker/alertmanager\.email\.tpl\.yml$''',
  '''(^|/)docker/alertmanager\.prod\.yml$''',
]

[[allowlists]]
description = "Allow alerting placeholder values (non-secrets)"
regexes = [
  '''replace-with-gmail-app-password''',
  '''\$\{SMTP_AUTH_PASSWORD\}''',
]
