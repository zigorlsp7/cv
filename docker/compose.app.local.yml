name: cvweb-app-local

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    ports:
      - "5432:5432"
    volumes:
      - app-local-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20
    logging:
      driver: "json-file"
      options:
        labels: "com.docker.compose.service"
    networks: [cv_shared]

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
      target: local
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:?NODE_ENV is required}
      PORT: ${API_PORT:?API_PORT is required}
      LOG_LEVEL: ${LOG_LEVEL:?LOG_LEVEL is required}
      DB_HOST: ${DB_HOST:?DB_HOST is required}
      DB_PORT: ${DB_PORT:?DB_PORT is required}
      DB_USER: ${DB_USER:?DB_USER is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME: ${DB_NAME:?DB_NAME is required}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required}
      CORS_METHODS: ${CORS_METHODS:?CORS_METHODS is required}
      CORS_ALLOWED_HEADERS: ${CORS_ALLOWED_HEADERS:?CORS_ALLOWED_HEADERS is required}
      CORS_EXPOSED_HEADERS: ${CORS_EXPOSED_HEADERS:?CORS_EXPOSED_HEADERS is required}
      CORS_CREDENTIALS: ${CORS_CREDENTIALS:?CORS_CREDENTIALS is required}
      CORS_MAX_AGE_SECONDS: ${CORS_MAX_AGE_SECONDS:?CORS_MAX_AGE_SECONDS is required}
      RATE_LIMIT_TTL_MS: ${RATE_LIMIT_TTL_MS:?RATE_LIMIT_TTL_MS is required}
      RATE_LIMIT_LIMIT: ${RATE_LIMIT_LIMIT:?RATE_LIMIT_LIMIT is required}
      TRUST_PROXY: ${TRUST_PROXY:?TRUST_PROXY is required}
      REQUEST_TIMEOUT_MS: ${REQUEST_TIMEOUT_MS:?REQUEST_TIMEOUT_MS is required}
      HEADERS_TIMEOUT_MS: ${HEADERS_TIMEOUT_MS:?HEADERS_TIMEOUT_MS is required}
      KEEP_ALIVE_TIMEOUT_MS: ${KEEP_ALIVE_TIMEOUT_MS:?KEEP_ALIVE_TIMEOUT_MS is required}
      REQUEST_BODY_LIMIT: ${REQUEST_BODY_LIMIT:?REQUEST_BODY_LIMIT is required}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:?OTEL_SERVICE_NAME is required}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:?OTEL_EXPORTER_OTLP_ENDPOINT is required}
      OPENBAO_ADDR: ${OPENBAO_ADDR:?OPENBAO_ADDR is required}
      OPENBAO_TOKEN: ${OPENBAO_TOKEN:?OPENBAO_TOKEN is required}
      OPENBAO_KV_MOUNT: ${OPENBAO_KV_MOUNT:?OPENBAO_KV_MOUNT is required}
      OPENBAO_SECRET_PATH: ${OPENBAO_SECRET_PATH:?OPENBAO_SECRET_PATH is required}
      OPENBAO_REQUIRED_KEYS: ${OPENBAO_REQUIRED_KEYS_API:?OPENBAO_REQUIRED_KEYS_API is required}
      FEATURE_FLAGS: ${FEATURE_FLAGS:?FEATURE_FLAGS is required}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        labels: "com.docker.compose.service"
    command: ["node", "/app/scripts/openbao-run.mjs", "--", "node", "dist/main.js"]
    networks: [cv_shared]

  api_migrate:
    profiles: ["tools"]
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
      target: local
    environment:
      NODE_ENV: ${NODE_ENV:?NODE_ENV is required}
      DB_HOST: ${DB_HOST:?DB_HOST is required}
      DB_PORT: ${DB_PORT:?DB_PORT is required}
      DB_USER: ${DB_USER:?DB_USER is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME: ${DB_NAME:?DB_NAME is required}
      PORT: ${API_PORT:?API_PORT is required}
      LOG_LEVEL: ${LOG_LEVEL:?LOG_LEVEL is required}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required}
      CORS_METHODS: ${CORS_METHODS:?CORS_METHODS is required}
      CORS_ALLOWED_HEADERS: ${CORS_ALLOWED_HEADERS:?CORS_ALLOWED_HEADERS is required}
      CORS_EXPOSED_HEADERS: ${CORS_EXPOSED_HEADERS:?CORS_EXPOSED_HEADERS is required}
      CORS_CREDENTIALS: ${CORS_CREDENTIALS:?CORS_CREDENTIALS is required}
      CORS_MAX_AGE_SECONDS: ${CORS_MAX_AGE_SECONDS:?CORS_MAX_AGE_SECONDS is required}
      RATE_LIMIT_TTL_MS: ${RATE_LIMIT_TTL_MS:?RATE_LIMIT_TTL_MS is required}
      RATE_LIMIT_LIMIT: ${RATE_LIMIT_LIMIT:?RATE_LIMIT_LIMIT is required}
      TRUST_PROXY: ${TRUST_PROXY:?TRUST_PROXY is required}
      REQUEST_TIMEOUT_MS: ${REQUEST_TIMEOUT_MS:?REQUEST_TIMEOUT_MS is required}
      HEADERS_TIMEOUT_MS: ${HEADERS_TIMEOUT_MS:?HEADERS_TIMEOUT_MS is required}
      KEEP_ALIVE_TIMEOUT_MS: ${KEEP_ALIVE_TIMEOUT_MS:?KEEP_ALIVE_TIMEOUT_MS is required}
      REQUEST_BODY_LIMIT: ${REQUEST_BODY_LIMIT:?REQUEST_BODY_LIMIT is required}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:?OTEL_SERVICE_NAME is required}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:?OTEL_EXPORTER_OTLP_ENDPOINT is required}
      OPENBAO_ADDR: ${OPENBAO_ADDR:?OPENBAO_ADDR is required}
      OPENBAO_TOKEN: ${OPENBAO_TOKEN:?OPENBAO_TOKEN is required}
      OPENBAO_KV_MOUNT: ${OPENBAO_KV_MOUNT:?OPENBAO_KV_MOUNT is required}
      OPENBAO_SECRET_PATH: ${OPENBAO_SECRET_PATH:?OPENBAO_SECRET_PATH is required}
      OPENBAO_REQUIRED_KEYS: ${OPENBAO_REQUIRED_KEYS_API:?OPENBAO_REQUIRED_KEYS_API is required}
      FEATURE_FLAGS: ${FEATURE_FLAGS:?FEATURE_FLAGS is required}
    command: ["node", "/app/scripts/openbao-run.mjs", "--", "node", "/app/apps/api/node_modules/typeorm/cli.js", "-d", "dist/typeorm.datasource.js", "migration:run"]
    depends_on:
      postgres:
        condition: service_healthy
    networks: [cv_shared]

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      target: local
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:?NEXT_PUBLIC_API_BASE_URL is required}
      NEXT_PUBLIC_RUM_ENABLED: ${NEXT_PUBLIC_RUM_ENABLED:?NEXT_PUBLIC_RUM_ENABLED is required}
      NEXT_PUBLIC_RUM_ENDPOINT: ${NEXT_PUBLIC_RUM_ENDPOINT:?NEXT_PUBLIC_RUM_ENDPOINT is required}
      NEXT_PUBLIC_RELEASE: ${NEXT_PUBLIC_RELEASE:?NEXT_PUBLIC_RELEASE is required}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID?GOOGLE_CLIENT_ID must be set}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET?GOOGLE_CLIENT_SECRET must be set}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI?GOOGLE_OAUTH_REDIRECT_URI must be set}
      ADMIN_GOOGLE_EMAILS: ${ADMIN_GOOGLE_EMAILS?ADMIN_GOOGLE_EMAILS must be set}
      I18N_SOURCE: ${I18N_SOURCE:?I18N_SOURCE is required}
      TOLGEE_API_URL: ${TOLGEE_API_URL:?TOLGEE_API_URL is required}
      TOLGEE_PROJECT_ID: ${TOLGEE_PROJECT_ID:?TOLGEE_PROJECT_ID is required}
      OPENBAO_ADDR: ${OPENBAO_ADDR:?OPENBAO_ADDR is required}
      OPENBAO_TOKEN: ${OPENBAO_TOKEN:?OPENBAO_TOKEN is required}
      OPENBAO_KV_MOUNT: ${OPENBAO_KV_MOUNT:?OPENBAO_KV_MOUNT is required}
      OPENBAO_SECRET_PATH: ${OPENBAO_SECRET_PATH:?OPENBAO_SECRET_PATH is required}
      OPENBAO_REQUIRED_KEYS: ${OPENBAO_REQUIRED_KEYS_WEB:?OPENBAO_REQUIRED_KEYS_WEB is required}
    ports:
      - "3001:3001"
    depends_on:
      - api
    command: ["node", "/app/scripts/openbao-run.mjs", "--", "node", "apps/web/server.js"]
    logging:
      driver: "json-file"
      options:
        labels: "com.docker.compose.service"
    networks: [cv_shared]

  alloy:
    image: grafana/alloy:v1.12.0
    restart: unless-stopped
    command:
      - run
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    volumes:
      - ../docker/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - app-local-alloy-data:/var/lib/alloy/data
    depends_on:
      - api
    networks: [cv_shared]

networks:
  cv_shared:
    name: ${CV_SHARED_NETWORK:?CV_SHARED_NETWORK is required}
    external: true

volumes:
  app-local-pgdata:
  app-local-alloy-data:
