name: cvweb-app-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-db-password}
      POSTGRES_DB: ${POSTGRES_DB:-cv}
    volumes:
      - app-prod-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20
    logging:
      driver: "json-file"
      options:
        labels: "com.docker.compose.service"
    networks: [cv_shared]

  api:
    image: ${API_IMAGE:-cv-api:latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-app}
      DB_PASSWORD: ${DB_PASSWORD:-change-me-db-password}
      DB_NAME: ${DB_NAME:-cv}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://app.example.com}
      CORS_METHODS: GET,HEAD,PUT,PATCH,POST,DELETE,OPTIONS
      CORS_ALLOWED_HEADERS: Content-Type,Authorization,X-Request-Id
      CORS_EXPOSED_HEADERS: X-Request-Id
      CORS_CREDENTIALS: "true"
      CORS_MAX_AGE_SECONDS: 600
      RATE_LIMIT_TTL_MS: 60000
      RATE_LIMIT_LIMIT: 100
      TRUST_PROXY: ${TRUST_PROXY:-1}
      REQUEST_TIMEOUT_MS: 30000
      HEADERS_TIMEOUT_MS: 30000
      KEEP_ALIVE_TIMEOUT_MS: 5000
      REQUEST_BODY_LIMIT: 1mb
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-cv-api}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:-change-me-admin-api-token}
      FEATURE_FLAGS: ${FEATURE_FLAGS:-swagger_docs=false,rum_ingest=true}
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        labels: "com.docker.compose.service"
    networks: [cv_shared]

  api_migrate:
    profiles: ["tools"]
    image: ${API_IMAGE:-cv-api:latest}
    environment:
      NODE_ENV: production
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-app}
      DB_PASSWORD: ${DB_PASSWORD:-change-me-db-password}
      DB_NAME: ${DB_NAME:-cv}
      PORT: 3000
      LOG_LEVEL: info
      CORS_ORIGINS: ${CORS_ORIGINS:-https://app.example.com}
      CORS_METHODS: GET,HEAD,PUT,PATCH,POST,DELETE,OPTIONS
      CORS_ALLOWED_HEADERS: Content-Type,Authorization,X-Request-Id
      CORS_EXPOSED_HEADERS: X-Request-Id
      CORS_CREDENTIALS: "true"
      CORS_MAX_AGE_SECONDS: 600
      RATE_LIMIT_TTL_MS: 60000
      RATE_LIMIT_LIMIT: 100
      TRUST_PROXY: ${TRUST_PROXY:-1}
      REQUEST_TIMEOUT_MS: 30000
      HEADERS_TIMEOUT_MS: 30000
      KEEP_ALIVE_TIMEOUT_MS: 5000
      REQUEST_BODY_LIMIT: 1mb
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-cv-api}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:-change-me-admin-api-token}
      FEATURE_FLAGS: ${FEATURE_FLAGS:-swagger_docs=false,rum_ingest=true}
    command: ["sh", "-lc", "node /app/apps/api/node_modules/typeorm/cli.js -d dist/typeorm.datasource.js migration:run"]
    depends_on:
      postgres:
        condition: service_healthy
    networks: [cv_shared]

  web:
    image: ${WEB_IMAGE:-cv-web:latest}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://api.example.com}
      NEXT_PUBLIC_RUM_ENABLED: ${NEXT_PUBLIC_RUM_ENABLED:-true}
      NEXT_PUBLIC_RUM_ENDPOINT: ${NEXT_PUBLIC_RUM_ENDPOINT:-https://api.example.com/v1/rum/events}
      NEXT_PUBLIC_RELEASE: ${NEXT_PUBLIC_RELEASE:-unknown}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:-change-me-admin-api-token}
      AUTH_SESSION_SECRET: ${AUTH_SESSION_SECRET:-change-me-auth-session-secret}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-}
      ADMIN_GOOGLE_EMAILS: ${ADMIN_GOOGLE_EMAILS:-}
      I18N_SOURCE: ${I18N_SOURCE:-tolgee}
      TOLGEE_API_URL: ${TOLGEE_API_URL:-http://tolgee:8080}
      TOLGEE_PROJECT_ID: ${TOLGEE_PROJECT_ID:-2}
      TOLGEE_API_KEY: ${TOLGEE_API_KEY:-change-me-tolgee-api-key}
    depends_on:
      - api
    logging:
      driver: "json-file"
      options:
        labels: "com.docker.compose.service"
    networks: [cv_shared]

  alloy:
    image: grafana/alloy:v1.12.0
    restart: unless-stopped
    command:
      - run
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    volumes:
      - ../docker/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - app-prod-alloy-data:/var/lib/alloy/data
    depends_on:
      - api
    networks: [cv_shared]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      WEB_DOMAIN: ${WEB_DOMAIN:-app.example.com}
      API_DOMAIN: ${API_DOMAIN:-api.example.com}
    volumes:
      - ../docker/caddy/Caddyfile.app.prod:/etc/caddy/Caddyfile:ro
      - app-prod-caddy-data:/data
      - app-prod-caddy-config:/config
    depends_on:
      - web
      - api
    networks: [cv_shared]

networks:
  cv_shared:
    name: ${CV_SHARED_NETWORK:-cv_shared}
    external: true

volumes:
  app-prod-pgdata:
  app-prod-alloy-data:
  app-prod-caddy-data:
  app-prod-caddy-config:
