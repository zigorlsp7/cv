name: cv-app-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: cv
    volumes:
      - app-prod-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20
    logging:
      driver: "json-file"
      options:
        labels: "com.docker.compose.service"
    networks:
      cv_shared:
        aliases:
          - cv-postgres

  api:
    image: ${API_IMAGE:?API_IMAGE is required}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      LOG_LEVEL: info
      DB_HOST: cv-postgres
      DB_PORT: 5432
      DB_USER: app
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      DB_NAME: cv
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required}
      CORS_METHODS: GET,HEAD,PUT,PATCH,POST,DELETE,OPTIONS
      CORS_ALLOWED_HEADERS: Content-Type,Authorization,X-Request-Id
      CORS_EXPOSED_HEADERS: X-Request-Id
      CORS_CREDENTIALS: true
      CORS_MAX_AGE_SECONDS: 600
      RATE_LIMIT_TTL_MS: 60000
      RATE_LIMIT_LIMIT: 100
      TRUST_PROXY: ${TRUST_PROXY:?TRUST_PROXY is required}
      REQUEST_TIMEOUT_MS: 30000
      HEADERS_TIMEOUT_MS: 30000
      KEEP_ALIVE_TIMEOUT_MS: 5000
      REQUEST_BODY_LIMIT: 1mb
      OTEL_SERVICE_NAME: cv-api
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OPENBAO_ADDR: http://openbao:8200
      OPENBAO_TOKEN: ${OPENBAO_TOKEN:?OPENBAO_TOKEN is required}
      OPENBAO_KV_MOUNT: kv
      OPENBAO_SECRET_PATH: cv
      OPENBAO_REQUIRED_KEYS: AUTH_SESSION_SECRET
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:?SWAGGER_ENABLED is required}
      FEATURE_FLAGS: rum_ingest=true
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        labels: "com.docker.compose.service"
    command: ["node", "/app/scripts/openbao-run.mjs", "--", "sh", "-lc", "node /app/apps/api/node_modules/typeorm/cli.js -d dist/typeorm.datasource.js migration:run && exec node dist/main.js"]
    networks:
      cv_shared:
        aliases:
          - cv-api

  web:
    image: ${WEB_IMAGE:?WEB_IMAGE is required}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:?NEXT_PUBLIC_API_BASE_URL is required}
      NEXT_PUBLIC_RUM_ENABLED: "true"
      NEXT_PUBLIC_RELEASE: ${NEXT_PUBLIC_RELEASE:?NEXT_PUBLIC_RELEASE is required}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID?GOOGLE_CLIENT_ID must be set}
      TOLGEE_API_URL: http://tolgee:8080
      TOLGEE_PROJECT_ID: 2
      OPENBAO_ADDR: http://openbao:8200
      OPENBAO_TOKEN: ${OPENBAO_TOKEN:?OPENBAO_TOKEN is required}
      OPENBAO_KV_MOUNT: kv
      OPENBAO_SECRET_PATH: cv
      OPENBAO_REQUIRED_KEYS: AUTH_SESSION_SECRET,TOLGEE_API_KEY,GOOGLE_CLIENT_SECRET,ADMIN_GOOGLE_EMAILS
    depends_on:
      - api
    logging:
      driver: "json-file"
      options:
        labels: "com.docker.compose.service"
    command:
      [
        "sh",
        "-lc",
        "until wget -qO- http://cv-api:3000/v1/health/ready >/dev/null 2>&1; do sleep 2; done; exec node /app/scripts/openbao-run.mjs -- node apps/ui/server.js",
      ]
    networks:
      cv_shared:
        aliases:
          - cv-web

  alloy:
    image: grafana/alloy:v1.12.0
    restart: unless-stopped
    command:
      - run
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    volumes:
      - ../docker/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - app-prod-alloy-data:/var/lib/alloy/data
    depends_on:
      - api
    networks: [cv_shared]

networks:
  cv_shared:
    name: platform_ops_shared
    external: true

volumes:
  app-prod-pgdata:
  app-prod-alloy-data:
