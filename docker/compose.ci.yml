name: cvweb-ci

services:
  postgres_test:
    image: postgres:16-alpine
    profiles: ["test"]
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: cv_test
    ports:
      - "5433:5432"
    volumes:
      - pgdata_test:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d cv_test"]
      interval: 5s
      timeout: 3s
      retries: 20

  api_test:
    profiles: ["test"]
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
      target: dev
    environment:
      NODE_ENV: test
      PORT: 3000
      LOG_LEVEL: info
      DB_HOST: postgres_test
      DB_PORT: 5432
      DB_USER: app
      DB_PASSWORD: app
      DB_NAME: cv_test
      CORS_ORIGINS: http://localhost:3001
      CORS_METHODS: GET,HEAD,PUT,PATCH,POST,DELETE,OPTIONS
      CORS_ALLOWED_HEADERS: Content-Type,Authorization,X-Request-Id
      CORS_EXPOSED_HEADERS: X-Request-Id
      CORS_CREDENTIALS: "true"
      CORS_MAX_AGE_SECONDS: 600
      RATE_LIMIT_TTL_MS: 60000
      RATE_LIMIT_LIMIT: 100
      TRUST_PROXY: "false"
      REQUEST_TIMEOUT_MS: 30000
      HEADERS_TIMEOUT_MS: 30000
      KEEP_ALIVE_TIMEOUT_MS: 5000
      REQUEST_BODY_LIMIT: 1mb
      OTEL_SERVICE_NAME: cv-api-test
      OTEL_EXPORTER_OTLP_ENDPOINT: http://localhost:4318
      ADMIN_API_TOKEN: local-admin-token
      FEATURE_FLAGS: swagger_docs=true,rum_ingest=true
    ports:
      - "3003:3000"
    depends_on:
      postgres_test:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/v1/health/ready >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
    command: npm run start:dev -w @cv/api

  web:
    profiles: ["test"]
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      target: dev
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://api_test:3000}
      NEXT_PUBLIC_RUM_ENABLED: ${NEXT_PUBLIC_RUM_ENABLED:-false}
      NEXT_PUBLIC_RUM_ENDPOINT: ${NEXT_PUBLIC_RUM_ENDPOINT:-http://api_test:3000/v1/rum/events}
      ADMIN_API_TOKEN: local-admin-token
      AUTH_SESSION_SECRET: local-auth-session-secret
      I18N_SOURCE: ${I18N_SOURCE:-local}
    ports:
      - "3001:3001"
    depends_on:
      api_test:
        condition: service_started
    command: sh -lc "cd /workspace/apps/web && npm run dev -- -p 3001 -H 0.0.0.0"

  k6_test:
    image: grafana/k6:0.49.0
    profiles: ["test"]
    environment:
      API_BASE_URL: http://api_test:3000
    volumes:
      - ../loadtest:/scripts:ro
      - ../artifacts:/artifacts
    command: ["run", "--summary-export", "/artifacts/k6-summary-test.json", "/scripts/health.js"]
    depends_on:
      api_test:
        condition: service_healthy

volumes:
  pgdata_test:
