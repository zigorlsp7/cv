name: cvweb-ops-local

services:
  jaeger:
    image: jaegertracing/all-in-one:1.53
    restart: unless-stopped
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    networks: [cv_shared]

  otel-collector:
    image: otel/opentelemetry-collector:0.98.0
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yml"]
    volumes:
      - ../docker/otel-collector-config.yml:/etc/otelcol/config.yml:ro
    ports:
      - "4319:4317"
      - "4320:4318"
    depends_on:
      - jaeger
    networks: [cv_shared]

  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    volumes:
      - ../docker/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    networks: [cv_shared]

  prometheus:
    image: prom/prometheus:v2.51.2
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ../docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../docker/prometheus.rules.yml:/etc/prometheus/prometheus.rules.yml:ro
      - ../docker/prometheus.alerts.yml:/etc/prometheus/prometheus.alerts.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - alertmanager
    networks: [cv_shared]

  grafana:
    image: grafana/grafana:10.4.2
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-cv_admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-change-this-admin-password}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ops-local-grafana-data:/var/lib/grafana
      - ../docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks: [cv_shared]

  loki:
    image: grafana/loki:2.9.8
    restart: unless-stopped
    command: ["-config.file=/etc/loki/config.yml"]
    ports:
      - "3100:3100"
    volumes:
      - ../docker/loki/config.yml:/etc/loki/config.yml:ro
      - ops-local-loki-data:/loki
    networks: [cv_shared]

  tolgee:
    image: tolgee/tolgee:v3.141.1
    restart: unless-stopped
    ports:
      - "8090:8080"
    volumes:
      - ops-local-tolgee-data:/data
      - ./tolgee/config.yaml:/config.yaml:ro
    command: ["--config=/config.yaml"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz >/dev/null 2>&1 || wget -qO- http://localhost:8080/api/healthz >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks: [cv_shared]

  infisical_db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${INFISICAL_POSTGRES_USER:-infisical}
      POSTGRES_PASSWORD: ${INFISICAL_POSTGRES_PASSWORD:-infisical}
      POSTGRES_DB: ${INFISICAL_POSTGRES_DB:-infisical}
    ports:
      - "5434:5432"
    volumes:
      - ops-local-infisical-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [cv_shared]

  infisical_redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - ops-local-infisical-redis:/data
    networks: [cv_shared]

  infisical:
    image: infisical/infisical:v0.158.3
    restart: unless-stopped
    env_file:
      - ./infisical/.env
    environment:
      DB_CONNECTION_URI: postgres://${INFISICAL_POSTGRES_USER:-infisical}:${INFISICAL_POSTGRES_PASSWORD:-infisical}@infisical_db:5432/${INFISICAL_POSTGRES_DB:-infisical}
    depends_on:
      infisical_db:
        condition: service_healthy
      infisical_redis:
        condition: service_started
    ports:
      - "8091:8080"
    networks: [cv_shared]

networks:
  cv_shared:
    name: ${CV_SHARED_NETWORK:-cv_shared}
    external: true

volumes:
  ops-local-grafana-data:
  ops-local-loki-data:
  ops-local-tolgee-data:
  ops-local-infisical-db:
  ops-local-infisical-redis:
