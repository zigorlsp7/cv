name: cv-precommit

services:
  postgres_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: cv_test
    ports:
      - "5433:5432"
    volumes:
      - pgdata_test:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d cv_test"]
      interval: 5s
      timeout: 3s
      retries: 20

  api_test:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
      target: dev
    environment:
      NODE_ENV: test
      PORT: 3000
      LOG_LEVEL: info
      DB_HOST: postgres_test
      DB_PORT: 5432
      DB_USER: app
      DB_PASSWORD: app
      DB_NAME: cv_test
      CORS_ORIGINS: http://localhost:3101
      CORS_METHODS: GET,HEAD,PUT,PATCH,POST,DELETE,OPTIONS
      CORS_ALLOWED_HEADERS: Content-Type,Authorization,X-Request-Id
      CORS_EXPOSED_HEADERS: X-Request-Id
      CORS_CREDENTIALS: "true"
      CORS_MAX_AGE_SECONDS: 600
      RATE_LIMIT_TTL_MS: 60000
      RATE_LIMIT_LIMIT: 100
      TRUST_PROXY: "false"
      REQUEST_TIMEOUT_MS: 30000
      HEADERS_TIMEOUT_MS: 30000
      KEEP_ALIVE_TIMEOUT_MS: 5000
      REQUEST_BODY_LIMIT: 1mb
      OTEL_SERVICE_NAME: cv-api-test
      OTEL_EXPORTER_OTLP_ENDPOINT: http://localhost:4318
      AUTH_SESSION_SECRET: local-auth-session-secret
      SWAGGER_ENABLED: "true"
      FEATURE_FLAGS: rum_ingest=true
    ports:
      - "3003:3000"
    depends_on:
      postgres_test:
        condition: service_healthy
    volumes:
      - ../apps/api:/app/apps/api
      - ../package.json:/app/package.json
      - ../package-lock.json:/app/package-lock.json
      - /app/node_modules
      - /app/apps/api/node_modules
    command: npm run start:dev -w @cv/api
    logging:
      driver: "json-file"
      options:
        labels: "com.docker.compose.service"

  web:
    build:
      context: ..
      dockerfile: apps/ui/Dockerfile
      target: dev
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://api_test:3000
      NEXT_PUBLIC_RUM_ENABLED: false
      NEXT_PUBLIC_RUM_ENDPOINT: http://api_test:3000/v1/rum/events
      AUTH_SESSION_SECRET: local-auth-session-secret
      GOOGLE_CLIENT_ID: ""
      GOOGLE_CLIENT_SECRET: ""
      GOOGLE_OAUTH_REDIRECT_URI: ""
      ADMIN_GOOGLE_EMAILS: ""
    ports:
      - "3101:3001"
    depends_on:
      api_test:
        condition: service_started
    volumes:
      - ../apps/ui:/workspace/apps/ui
      - ../package.json:/workspace/package.json
      - ../package-lock.json:/workspace/package-lock.json
      - /workspace/node_modules
      - /workspace/apps/ui/node_modules
    command: npm run dev -w web -- -p 3001 -H 0.0.0.0
    logging:
      driver: "json-file"
      options:
        labels: "com.docker.compose.service"

volumes:
  pgdata_test:
