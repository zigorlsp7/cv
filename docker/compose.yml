name: cvweb

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: cv
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d cv"]
      interval: 5s
      timeout: 3s
      retries: 20
    logging:
      driver: "json-file"
      options:
        labels: "com.docker.compose.service"
  postgres_test:
    image: postgres:16-alpine
    profiles: ["test"]
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: cv_test
    ports:
      - "5433:5432"
    volumes:
      - pgdata_test:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d cv_test"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
      target: dev
    environment:
      NODE_ENV: development
      PORT: 3000
      LOG_LEVEL: info
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: app
      DB_PASSWORD: app
      DB_NAME: cv
      CORS_ORIGINS: http://localhost:3001,http://web:3001
      CORS_METHODS: GET,HEAD,PUT,PATCH,POST,DELETE,OPTIONS
      CORS_ALLOWED_HEADERS: Content-Type,Authorization,X-Request-Id
      CORS_EXPOSED_HEADERS: X-Request-Id
      CORS_CREDENTIALS: "true"
      CORS_MAX_AGE_SECONDS: 600
      RATE_LIMIT_TTL_MS: 60000
      RATE_LIMIT_LIMIT: 100
      TRUST_PROXY: "false"
      REQUEST_TIMEOUT_MS: 30000
      HEADERS_TIMEOUT_MS: 30000
      KEEP_ALIVE_TIMEOUT_MS: 5000
      REQUEST_BODY_LIMIT: 1mb
      OTEL_SERVICE_NAME: cv-api
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
      FEATURE_FLAGS: swagger_docs=true,rum_ingest=true
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../apps/api:/app/apps/api
      - ../package.json:/app/package.json
      - ../package-lock.json:/app/package-lock.json
      - ../node_modules:/app/node_modules
    logging:
      driver: "json-file"
      options:
        labels: "com.docker.compose.service"

  api_test:
    profiles: ["test"]
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
      target: dev
    environment:
      NODE_ENV: test
      PORT: 3000
      LOG_LEVEL: info
      DB_HOST: postgres_test
      DB_PORT: 5432
      DB_USER: app
      DB_PASSWORD: app
      DB_NAME: cv_test
      CORS_ORIGINS: http://localhost:3001
      CORS_METHODS: GET,HEAD,PUT,PATCH,POST,DELETE,OPTIONS
      CORS_ALLOWED_HEADERS: Content-Type,Authorization,X-Request-Id
      CORS_EXPOSED_HEADERS: X-Request-Id
      CORS_CREDENTIALS: "true"
      CORS_MAX_AGE_SECONDS: 600
      RATE_LIMIT_TTL_MS: 60000
      RATE_LIMIT_LIMIT: 100
      TRUST_PROXY: "false"
      REQUEST_TIMEOUT_MS: 30000
      HEADERS_TIMEOUT_MS: 30000
      KEEP_ALIVE_TIMEOUT_MS: 5000
      REQUEST_BODY_LIMIT: 1mb
      OTEL_SERVICE_NAME: cv-api-test
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
      FEATURE_FLAGS: swagger_docs=true,rum_ingest=true
    ports:
      - "3003:3000"
    depends_on:
      postgres_test:
        condition: service_healthy
    volumes:
      - ../apps/api:/app/apps/api
      - ../package.json:/app/package.json
      - ../package-lock.json:/app/package-lock.json
      - ../node_modules:/app/node_modules
    logging:
      driver: "json-file"
      options:
        labels: "com.docker.compose.service"

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      target: dev
    env_file:
      - ../apps/web/.env
    environment:
      INFISICAL_API_URL: ${INFISICAL_API_URL:-http://infisical:8080}
      INFISICAL_PROJECT_ID: ${INFISICAL_PROJECT_ID}
      INFISICAL_ENV: ${INFISICAL_ENV:-dev}
      INFISICAL_TOKEN: ${INFISICAL_TOKEN}
    ports:
      - "3001:3001"
    depends_on:
      - api
      - infisical
    volumes:
      - ../apps/web:/workspace/apps/web
      - ../package.json:/workspace/package.json
      - ../package-lock.json:/workspace/package-lock.json
      - /workspace/node_modules
      - /workspace/apps/web/node_modules
    command: >
      sh -lc "until curl -fsS $INFISICAL_API_URL/api/status >/dev/null; do
        echo 'Waiting for Infisical...'; sleep 2; done;
      infisical run
      --token=$INFISICAL_TOKEN
      --projectId=$INFISICAL_PROJECT_ID
      --env=$INFISICAL_ENV
      --domain=$INFISICAL_API_URL
      -- npm run dev -w web -- -p 3001 -H 0.0.0.0"
    logging:
      driver: "json-file"
      options:
        labels: "com.docker.compose.service"

  jaeger:
    image: jaegertracing/all-in-one:1.53
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP

  otel-collector:
    image: otel/opentelemetry-collector:0.98.0
    command: ["--config=/etc/otelcol/config.yml"]
    volumes:
      - ../docker/otel-collector-config.yml:/etc/otelcol/config.yml:ro
    ports:
      - "4319:4317"     # optional host access (gRPC)
      - "4320:4318"     # optional host access (HTTP)
    depends_on:
      - jaeger

  prometheus:
    image: prom/prometheus:v2.51.2
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ../docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../docker/prometheus.rules.yml:/etc/prometheus/prometheus.rules.yml:ro
      - ../docker/prometheus.alerts.yml:/etc/prometheus/prometheus.alerts.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - api
      - alertmanager

  alertmanager:
    image: prom/alertmanager:v0.27.0
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    volumes:
      - ../docker/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"

  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ../docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

  loki:
    image: grafana/loki:2.9.8
    command: ["-config.file=/etc/loki/config.yml"]
    ports:
      - "3100:3100"
    volumes:
      - ../docker/loki/config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki

  promtail:
    image: grafana/promtail:2.9.8
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ../docker/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      - loki

  k6:
    image: grafana/k6:0.49.0
    profiles: ["loadtest"]
    environment:
      API_BASE_URL: http://api:3000
    volumes:
      - ../loadtest:/scripts:ro
      - ../artifacts:/artifacts
    command: ["run", "--summary-export", "/artifacts/k6-summary.json", "/scripts/health.js"]
    depends_on:
      - api

  k6_test:
    image: grafana/k6:0.49.0
    profiles: ["test"]
    environment:
      API_BASE_URL: http://api_test:3000
    volumes:
      - ../loadtest:/scripts:ro
      - ../artifacts:/artifacts
    command: ["run", "--summary-export", "/artifacts/k6-summary-test.json", "/scripts/health.js"]
    depends_on:
      - api_test
      
  tolgee:
    image: tolgee/tolgee:latest
    ports:
      - "8090:8080"
    volumes:
      - tolgee-data:/data
      - ./tolgee/config.yaml:/config.yaml:ro
    command: ["--config=/config.yaml"]

  infisical_db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-infisical}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-infisical}
      POSTGRES_DB: ${POSTGRES_DB:-infisical}
    ports:
      - "5434:5432"
    volumes:
      - infisical-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20

  infisical_redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - infisical-redis:/data

  infisical:
    image: infisical/infisical:latest
    env_file:
      - ./infisical/.env
    depends_on:
      infisical_db:
        condition: service_healthy
      infisical_redis:
        condition: service_started
    ports:
      - "8091:8080"

volumes:
  pgdata:
  pgdata_test:
  grafana-data:
  loki-data:
  tolgee-data:
  infisical-db:
  infisical-redis:
