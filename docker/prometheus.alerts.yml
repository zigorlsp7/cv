groups:
  - name: cv_api_alerts
    rules:
      - alert: CvApiHighErrorRate
        expr: cv_api:http_error_ratio:rate5m > 0.02
        for: 5m
        labels:
          severity: page
        annotations:
          summary: "cv-api error rate > 2% (5m)"

      - alert: CvApiHighLatencyP95
        expr: cv_api:http_p95_seconds:5m > 0.3
        for: 5m
        labels:
          severity: page
        annotations:
          summary: "cv-api p95 latency > 300ms (5m)"