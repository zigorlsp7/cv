server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker-json-logs
    static_configs:
      - targets: [localhost]
        labels:
          job: docker-json-logs
          __path__: /var/lib/docker/containers/*/*-json.log

    pipeline_stages:
      # Parse Docker json-file log lines: {"log": "...", "stream": "...", "time": "...", "attrs": {...}}
      - json:
          expressions:
            output: log
            stream: stream
            ts: time
            service: attrs."com.docker.compose.service"

      - timestamp:
          source: ts
          format: RFC3339Nano

      - labels:
          stream:
          service:

      - output:
          source: output